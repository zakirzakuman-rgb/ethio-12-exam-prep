<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 12 Matric Preparation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-section" style="padding: 20px; background: #ecf0f1; margin-bottom: 20px;">
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="login()">Login</button>
</div>

<div id="welcome-message" style="display: none; padding: 20px;">
    <h2 id="user-display"></h2>
</div>
    <header>
        <h1>Matric Exam Practice Center</h1>
        <p>Master your subjects with real exam questions</p>
    </header>

    <div class="container">
        <div class="resource-grid">
            <div class="card" onclick="startQuiz('English')"><h3>English</h3><p>100 Questions</p></div>
            <div class="card" onclick="startQuiz('History')"><h3>History</h3><p>100 Questions</p></div>
            <div class="card" onclick="startQuiz('Geography')"><h3>Geography</h3><p>100 Questions</p></div>
            <div class="card" onclick="startQuiz('Economics')"><h3>Economics</h3><p>100 Questions</p></div>
            <div class="card" onclick="startQuiz('Aptitude')"><h3>Aptitude</h3><p>100 Questions</p></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
